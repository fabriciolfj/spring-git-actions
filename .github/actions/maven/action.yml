name: Java CI with Maven
description: Setup JDK and build with Maven

runs:
  using: composite
  steps:
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: temurin
        cache: maven        # já faz o cache do ~/.m2 automaticamente

    - name: Build with Maven
      run: mvn -B clean package --file pom.xml
      shell: bash

    - name: Test with Maven
      run: mvn test
      shell: bash