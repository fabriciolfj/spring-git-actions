name: Java CI With docker
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with maven
        run: mvn clean install -DskipTests

      - name: Build Docker image
        run: docker build -t my-java-app .

      - name: Push docker image to registry
        uses: docker/build-push-action@v5
        run: |
          echo ${{ secrets.DOCKER_HUB_PASSWORD }} | docker login - u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin docker tag my-java-app ${{ secrets.DOCKER_HUB_USERNAME}}/my-java-app:latest